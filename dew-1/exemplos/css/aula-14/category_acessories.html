<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0,
    minimum-scale=1.0, maximum-scale=5.0, user-scalable=yes"
    />
    <title>Vendas de acessórios para TVs</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./styles-responsive-grid.css" />
  </head>

  <body class="page-category-acessories">
    <header class="header">
      <p>Venda de TVs e acessórios online</p>
      <nav class="nav">
        <ul>
          <li>
            <a href="./products.html">Home</a>
          </li>
          <li>
            <a href="./category_tvs.html" target="_self">TVs</a>
          </li>
          <li>
            <a href="./category_acessories.html">Acessórios</a>
          </li>
        </ul>
      </nav>
    </header>

    <main class="main">
      <section class="intro">
        <h1>Categoria de produtos</h1>
        <h2>Acessórios para TVs</h2>
      </section>

      <section class="products" aria-labelledby="products-title">
        <header>
          <h2 id="products-title">Acessórios para TVs disponíveis</h2>
        </header>

        <ul class="products-list">
          <li>
            <article class="product">
              <header>
                <h3>Suporte de parede para TV</h3>
              </header>

              <figure>
                <img
                  src="https://t06512.vtexassets.com/arquivos/ids/157712-300-300?v=638787682878270000&width=300&height=300&aspect=true"
                  alt="Imagem de suporte de parede para TV"
                />
                <figcaption>Suporte de parede para TV</figcaption>
              </figure>

              <p class="price">
                <strong>Preço:</strong>
                <data value="100">R$ 100,00</data>
              </p>

              <p class="installment">
                <strong>Parcelamento:</strong>
                <data value="50">R$ 50,00</data> em 10x
              </p>

              <footer>
                <a
                  href="https://www.samsung.com/br/tvs/"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  Ver mais
                </a>
              </footer>
            </article>
          </li>
        </ul>
      </section>
    </main>

    <footer class="footer"><small>Todos os direitos reservados</small></footer>
  </body>
</html>
