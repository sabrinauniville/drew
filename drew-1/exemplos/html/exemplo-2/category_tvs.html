<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TVs</title>
  </head>

  <body class="page-category-tvs">
    <h1>Categoria de produtos</h1>
    <h2>TVs</h2>

    <table border="1">
      <thead>
        <tr>
          <th>Imagem</th>
          <th>Modelo</th>
          <th>Preço</th>
          <th>Parcelamento</th>
          <th>Detalhes</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td>
            <img
              src="./images/tv_samsung.jpg"
              alt="Imagem de televisão modelo samsung"
              width="100"
            />
          </td>
          <td>Samsung</td>
          <td>R$ 2.000,00</td>
          <td>R$ 200,00 em 10x</td>
          <td>
            <a target="_blank" href="https://www.samsung.com/br/tvs/"
              >Ver mais</a
            >
          </td>
        </tr>

        <tr>
          <td>
            <img
              src="./images/tv_lg.jpeg"
              alt="Imagem de televisão modelo LG"
              width="100"
            />
          </td>
          <td>LG</td>
          <td>R$ 5.000,00</td>
          <td>R$ 500,00 em 10x</td>
          <td>
            <a
              target="_blank"
              href="https://www.lg.com/br/tvs-e-soundbars/qned-evo/"
              >Ver mais</a
            >
          </td>
        </tr>
      </tbody>
    </table>
    <form id="tv-request-form">
      <h2>Solicitação de Modelo de TV</h2>

      <!-- Nome -->
      <label for="nome">Nome:</label>
      <input
        type="text"
        id="nome"
        name="nome"
        placeholder="Digite seu nome"
        required
      />

      <!-- Email -->
      <label for="email">E-mail:</label>
      <input
        type="email"
        id="email"
        name="email"
        placeholder="Digite seu e-mail"
        required
      />

      <!-- Modelo de TV com datalist -->
      <label for="modelo">Modelo de TV desejado:</label>
      <input
        list="modelos-tv"
        id="modelo"
        name="modelo"
        placeholder="Escolha ou digite um modelo"
        required
      />

      <datalist id="modelos-tv">
        <option value="Samsung"></option>
        <option value="LG"></option>
      </datalist>
      <br /><br />

      <!-- Botões -->
      <button type="reset">Limpar</button>
      <button type="submit">Enviar</button>
    </form>
  </body>
</html>
