<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <title>Formulário de Contato</title>
</head>

<body>
  <h2>Formulário de Contato</h2>

  <form name="contactForm" id="contactForm" method="post">

    <label for="name">Nome:</label>
    <input type="text" name="name" id="name" required />

    <label for="email">Email:</label>
    <input type="email" name="email" id="email" required />

    <label for="phone">Telefone:</label>
    <input type="tel" name="phone" id="phone" />

    <label for="subject">Assunto:</label>
    <select name="subject" id="subject" required>
      <option value="" disabled selected>Selecione</option>
      <option value="duvida">Dúvida</option>
      <option value="orcamento">Orçamento</option>
      <option value="suporte">Suporte</option>
    </select>

    <label for="city">Qual a sua cidade?</label>
    <input list="cities" id="city" name="city">
    <datalist id="cities">
      <option value="Joinville">
      <option value="Florianópolis">
      <option value="Blumenau">
    </datalist>

    <label for="message">Mensagem:</label>
    <textarea name="message" id="message" required></textarea>

    <fieldset>
      <legend>Você aceita os termos de privacidade?</legend>

      <input type="radio" id="privacy-yes" name="privacy" value="yes" required>
      <label for="privacy-yes">Sim</label>

      <input type="radio" id="privacy-no" name="privacy" value="no">
      <label for="privacy-no">Não</label>
    </fieldset>

    <input type="checkbox" id="cookie" name="cookie" value="yes" required />
    <label for="cookie">Aceita nossos cookies?</label>

    <button type="reset" value="reset">Limpar</button>
    <button type="button" value="cancel" disabled>Cancelar</button>
    <button type="submit">Enviar</button>

  </form>

  <p id="erro" style="color: red"></p>
  <p id="sucesso" style="color: green"></p>

  <script src="script.js"></script>
</body>

</html>
