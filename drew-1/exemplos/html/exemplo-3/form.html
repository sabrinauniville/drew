<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Formulário de Contato</title>
</head>

<body>

  <h2>Formulário de Contato</h2>

  <form name="contactForm" id="contactForm" metod="post">
    <label>Nome:</label>
    <input type="text" id="name">

    <label>Email:</label>
    <input type="text" id="email">

    <label>Telefone:</label>
    <input type="text" id="phone">

    <label>Assunto:</label>
    <select id="subject">
      <option value="1">Selecione</option>
      <option value="2">Dúvida</option>
      <option value="3">Orçamento</option>
      <option value="4">Suporte</option>
    </select>

    <label>Mensagem:</label>
    <textarea id="message"></textarea>

    <fieldset>
      <legend>Você aceita os termos de privacidade?</legend>
      <label><input type="radio" name="radio" value="yes" /> Sim</label>
      <label><input type="radio" name="radio" value="no" /> Não</label>
    </fieldset>

    <input type="checkbox" id="cookie" name="cookie" checked value="yes" />
    <label for="cookie">Aceita nossos cookies?</label>

    <input type="checkbox" id="newsletter" name="newsletter" value="yes" switch />
    <label for="newsletter">Quer receber nossos e-mails?</label>

    <button type="submit">Enviar</button>

  </form>

  <p id="erro" style="color:red;"></p>
  <p id="sucesso" style="color:green;"></p>

  <script src="script.js"></script>

</body>

</html>
