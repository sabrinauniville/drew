<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

<div class="card">
  <h2>🟢 Aula 1 - Seu primeiro código</h2>

  <p>O JavaScript permite dar vida às páginas.</p>

  <p>Complete o código:</p>

  <pre>
let nome = ______;
console.log("Olá " + nome);
  </pre>

  <input id="resposta">
  <button onclick="verificar()">Verificar</button>
  <p id="feedback"></p>
</div>

<script>
let xpLocal = 0;

function verificar() {
  const r = document.getElementById("resposta").value;
  const f = document.getElementById("feedback");

  if (r.toLowerCase() === "sabrina") {
    f.innerText = "✅ Muito bem!";
    xpLocal += 10;
  } else {
    f.innerText = "❌ Tente novamente";
  }
}

// Anti IA

document.addEventListener("copy", e => e.preventDefault());

</script>

</body>
</html>
